<!DOCTYPE html>
<html>
<head>
    <title>Javascript - Odd or Even</title>
</head>
<body>

<input type="number" placeholder="Enter number" id="num">
<button onclick="checkNumber(num.value)">Check</button>

<script>
    function checkNumber(n) {
        if (n % 2 == 0) {
            document.write("It is an even number");
        } else {
            document.write("It is an odd number");
        }
    }
</script>

</body>
</html>
