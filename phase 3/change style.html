<!DOCTYPE html>
<html>
<head>
<title>Javascript - Change Style</title>
</head>
<body>

<h1 id="head1">NEHA NO</h1>

<button onclick="changeStyle()">Click</button>

<script>
function changeStyle() {
    var a = document.getElementById("head1");
    a.style.color = "purple";
    a.style.backgroundColor = "lightblue";
}
</script>

</body>
</html>
