<!DOCTYPE html>
<html>
<head>
    <title>Change Text Dynamicaly</title>
</head>
<body>

<h2 id="text">Javascript</h2>

<button onclick="changeText()">Click Me</button>

<script>
function changeText() {
    document.getElementById("text").innerHTML = "Javascript Tutorial";
}
</script>

</body>
</html>
