<!DOCTYPE html>
<html>
<head>
    <title>Change Text Dynamicaly</title>
</head>
<body>

<h2 id="text">cristiano</h2>

<button onclick="changeText()">Click Me</button>

<script>
function changeText() {
    document.getElementById("text").innerHTML = "cristiano ronaldo";
}
</script>

</body>
</html>
